# Shared shell environment values rendered into both the POSIX profile
# (dot_config/shell/profile.sh.tmpl) and the fish config
# (dot_config/fish/config.fish.tmpl). Edit values here once; both shells stay in sync.
env:
  android_home: /opt/homebrew/share/android-commandlinetools
  # Appended to ANDROID_HOME, in order, on PATH.
  android_path_subdirs:
    - tools
    - tools/bin
    - platform-tools
    - emulator
  # Appended to $HOME for PNPM_HOME.
  pnpm_home_rel: Library/pnpm
  ssh_auth_sock: ~/.1password/agent.sock
  lang: en_US.UTF-8
